xiaomi:
  # Key = DID kamera, Value = encrypted token dari Xiaomi cloud
  # Kualitas stream (parameter &subtype=N di URL):
  #   0 = auto | 1 = SD | 2 = HD (default go2rtc) | 3-5 = HD+ (kamera baru, skip jika kamera lama)
  "1630673468": V1:

streams:
